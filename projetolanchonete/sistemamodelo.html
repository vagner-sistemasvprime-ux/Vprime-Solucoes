<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vprime Sistemas</title>
  <link rel="icon" type="image/png" href="https://i.postimg.cc/zDkFkPd5/Logo-Vprime.png">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%; /* Ajustei para 100% para não sobrar espaço */
      width: 100%;
      overflow: hidden; /* Evita barras de rolagem duplas */
    }

    body {
      font-family: Arial, sans-serif;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <iframe id="sistemaIframe" src="" allow="clipboard-read; clipboard-write" title="Vprime sistemas - Sistema modelo"></iframe>

  <script>
    (function() {
      // 1. Sua URL atualizada do Google Apps Script
      const urlBase = "https://script.google.com/macros/s/AKfycbzrb_qL6mPOKKV_VR1yBxd-9LnBxcgDsimQUO2dfVRpFORLZb1e31P_r7pFZrnMxcrMxw/exec";

      // 2. Pega os parâmetros da URL (ex: ?mesa=1)
      const queryParams = window.location.search;

      // 3. Monta a URL final (Base + parâmetros)
      const urlFinal = urlBase + queryParams;

      // 4. Carrega o sistema no Iframe
      document.getElementById('sistemaIframe').src = urlFinal;
    })();
  </script>
</body>
</html>
