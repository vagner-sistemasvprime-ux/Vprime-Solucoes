<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vprime Sistemas</title>
  <link rel="icon" type="image/png" href="https://i.postimg.cc/zDkFkPd5/Logo-Vprime.png">
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #f8f9fa;
    }
    .loader {
      text-align: center;
      color: #333;
    }
  </style>
</head>
<body>

  <div class="loader">
    <h3>Carregando Cardápio...</h3>
    <p>Por favor, aguarde um instante.</p>
  </div>

  <script>
    (function() {
      // 1. Sua URL oficial do Google Apps Script (Link de Execução)
      const urlBase = "https://script.google.com/macros/s/AKfycbzrb_qL6mPOKKV_VR1yBxd-9LnBxcgDsimQUO2dfVRpFORLZb1e31P_r7pFZrnMxcrMxw/exec";

      // 2. Captura os parâmetros da URL atual (ex: ?mesa=5)
      const queryParams = window.location.search;

      // 3. Monta a URL final combinando os dois
      const urlFinal = urlBase + queryParams;

      // 4. Redireciona o navegador limpando o histórico do iframe antigo
      window.location.replace(urlFinal);
    })();
  </script>
</body>
</html>
