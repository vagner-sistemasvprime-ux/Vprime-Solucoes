<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fortaleza Açaí - Cardápio</title>
  <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/d/1ci8UWxvAtWSpoRumMSKPrw9jUVcPnt3c">

  <style>
    html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; }
    iframe { width: 100%; height: 100%; border: none; }
  </style>
</head>
<body>
  <iframe
  id="iframeCardapio"
  src=""
  title="Fortaleza Açaí - Cardápio Digital"
  allow="clipboard-read; clipboard-write"
  style="width:100%;height:100%;border:none;"
></iframe>

  <script>
    (function() {
      // URL do Script do Cardápio que você enviou
      const urlCardapio = "https://script.google.com/macros/s/AKfycbwNgN15Xkq2kO3JHlO14wfjP6k3TX4e9JGUt7DHw24x7912Za3Y7LEO9EAy1888u6HW5Q/exec";
      
      // Captura os parâmetros (ex: ?mesa=1)
      const params = window.location.search;
      
      // Carrega o Iframe com a mesa
      document.getElementById('iframeCardapio').src = urlCardapio + params;
    })();
  </script>
</body>
</html>
